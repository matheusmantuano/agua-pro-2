<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Água Pro</title>

<style>
body { font-family: Arial; padding: 20px; background:#f2f2f7; }

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

.barra {
  height: 10px;
  background: #007aff;
  margin: 3px 0;
  border-radius: 6px;
}

.mes {
  background: #eee;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background: #007aff;
  color: white;
}
</style>

</head>

<body>

<div class="box">

<h2>💧 Água Pro</h2>

<textarea id="dados" style="width:100%; height:100px;"></textarea>

<button onclick="calcular()">Calcular</button>
<button onclick="salvar()">Salvar mês</button>
<button onclick="limpar()">Limpar histórico</button>

<div id="resultado"></div>

<h3>📊 Consumo</h3>
<div id="grafico"></div>

<h3>📈 Histórico</h3>
<div id="historico"></div>

<div class="total" id="totalGeral"></div>

</div>

<script>

function calcular() {

  var texto = document.getElementById("dados").value;
  var linhas = texto.split("\n");

  var valores = [];
  var total = 0;

  for (var i = 0; i < linhas.length; i++) {
    var linha = linhas[i].trim();
    if (linha === "") continue;

    var partes = linha.split(":");
    var valor = partes[partes.length - 1];

    valor = valor.replace(",", ".");
    var numero = parseFloat(valor);

    if (!isNaN(numero)) {
      valores.push(numero);
      total += numero;
    }
  }

  if (valores.length === 0) {
    document.getElementById("resultado").innerHTML = "⚠️ Sem dados válidos";
    return;
  }

  var media = total / valores.length;
  var proj = media * 30;

  var conta = calcularConta(proj);

  document.getElementById("resultado").innerHTML =
    "Consumo: " + total.toFixed(1) +
    " | Conta: R$ " + conta.toFixed(2);

  desenharGrafico(valores);

  localStorage.setItem("ultimo", JSON.stringify({
    total: total,
    conta: conta,
    mes: new Date().toLocaleString('pt-BR', { month: 'short', year: 'numeric' })
  }));
}

function calcularConta(t) {
  if (t <= 10) return 80.84;
  if (t <= 20) return 80.84 + (t - 10) * 12.8;
  if (t <= 50) return 80.84 + (10 * 12.8) + (t - 20) * 31.9;
  return 80.84 + (10 * 12.8) + (30 * 31.9) + (t - 50) * 35.14;
}

function desenharGrafico(valores) {

  var div = document.getElementById("grafico");
  div.innerHTML = "";

  var max = Math.max.apply(null, valores);

  for (var i = 0; i < valores.length; i++) {
    var barra = document.createElement("div");
    barra.className = "barra";
    barra.style.width = (valores[i] / max * 100) + "%";
    div.appendChild(barra);
  }
}

function salvar() {

  var ultimo = localStorage.getItem("ultimo");
  if (!ultimo) {
    alert("Calcule primeiro");
    return;
  }

  var dados = JSON.parse(ultimo);
  var historico = JSON.parse(localStorage.getItem("historico") || "[]");

  historico.push(dados);

  localStorage.setItem("historico", JSON.stringify(historico));

  carregarHistorico();
}

function carregarHistorico() {

  var historico = JSON.parse(localStorage.getItem("historico") || "[]");
  var div = document.getElementById("historico");
  var totalGeral = 0;

  div.innerHTML = "";

  for (var i = 0; i < historico.length; i++) {

    var h = historico[i];
    totalGeral += h.conta;

    var el = document.createElement("div");
    el.className = "mes";

    el.innerHTML =
      "<b>" + h.mes + "</b><br>" +
      h.total.toFixed(1) + " m³<br>" +
      "R$ " + h.conta.toFixed(2);

    div.appendChild(el);
  }

  document.getElementById("totalGeral").innerHTML =
    "💰 Total gasto: R$ " + totalGeral.toFixed(2);
}

function limpar() {
  localStorage.removeItem("historico");
  carregarHistorico();
}

carregarHistorico();

</script>

</body>
</html>
